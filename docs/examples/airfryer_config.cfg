# Example: Airfryer annealing oven (standalone, multi-point h(T))
#
# Multi-point calibration for wide temperature range (60-200 deg C).
# Heating element limiting via secondary sensor.
# No bed heater.

[chamber_mpc]
heater: airfryer
heater_power: 1800
secondary_sensor: element
s2_safe_temp: 270
s2_safe_temp_zone: 20

# Calibrated parameters (populated by MPC_CHAMBER_CALIBRATE):
# chamber_heat_capacity: ...
# s1_responsiveness: ...
