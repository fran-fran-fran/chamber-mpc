# Example: 3D printer heated chamber (single-point, bed feedforward)
#
# Single-point calibration (narrow operating range 50-80 deg C).
# Bed heater disturbance feedforward.

[chamber_mpc]
heater: chamber
heater_power: 600
bed_heater: heater_bed
bed_transfer: 0.35

# Calibrated parameters (populated by MPC_CHAMBER_CALIBRATE):
# chamber_heat_capacity: ...
# s1_responsiveness: ...
# ambient_transfer_points:
#     70.0, 0.142

# Calibrate with:
#   MPC_CHAMBER_CALIBRATE HEATER=chamber POINTS=70 BED_TEMP=110
